# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
# Note: no "image:" field here intentionally.
# Local dev: Supervisor builds from Dockerfile automatically (HA UI "Install" works).
# CI: builder.yaml injects image: ghcr.io/<owner>/<slug>-{arch} before building.
name: Example add-on
version: "1.2.0"
slug: example
description: Modernes Home Assistant Add-on mit FastAPI Backend, React Frontend und WebSocket Integration
url: "https://github.com/home-assistant/addons-example/tree/main/example"
arch:
  - aarch64
  - amd64
init: false
apparmor: false
ingress: true
ingress_port: 8000
ingress_entry_point: /
panel_icon: mdi:application
panel_title: Example Dashboard
# Enable if your add-on needs to communicate with Home Assistant
homeassistant_api: true
# Enable if your add-on needs Supervisor API access
hassio_api: true
hassio_role: admin
map:
  - share:rw
options:
  log_level: info
schema:
  log_level: "list(debug|info|warning|error)?"
